baseURL = "https://nagarajrs.github.io/blog/"
languageCode = "en-us"
title = "Nagaraj's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true

[params]
  author = "Nagaraj"
  description = "HPC & Cloud Infrastructure | Life Sciences & Pharma | AI/ML at Scale"
  defaultTheme = "auto"        # auto | light | dark
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  comments = false

  [params.homeInfoParams]
    Title = "Hi, I'm Nagaraj"
    Content = "Senior HPC & Cloud Infrastructure Engineer with 6+ years building scientific computing platforms for global pharma R&D. I write about HPC, AI/ML infrastructure, and the engineering behind life sciences computing at scale."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nagarajrs"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/nagaraj-s-54273a1a3/"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    noClasses = false
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

[outputs]
  home = ["HTML", "RSS", "JSON"]
